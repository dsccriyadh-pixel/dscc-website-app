kind = "web"
previewPath = "/"
title = "DSCC Saudi Arabia"
version = "1.0.0"
id = "artifacts/dscc-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23416

[services.development]
run = "pnpm --filter @workspace/dscc-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dscc-website", "run", "build" ]
publicDir = "artifacts/dscc-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23416"
BASE_PATH = "/"
