kind = "web"
previewPath = "/admin/"
title = "DSCC Admin Dashboard"
version = "1.0.0"
id = "artifacts/dscc-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 22294

[services.development]
run = "pnpm --filter @workspace/dscc-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dscc-admin", "run", "build" ]
publicDir = "artifacts/dscc-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22294"
BASE_PATH = "/admin/"
